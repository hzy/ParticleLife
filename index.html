<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Particle Life</title>
  <style>
    * { margin: 0; padding: 0 }
    body { background: #000; overflow: hidden }
    canvas { display: block; width: 100vw; height: 100vh }
    #controls {
      position: fixed; top: 10px; left: 10px;
      background: rgba(0,0,0,.7); padding: 12px; border-radius: 8px;
      color: #fff; font: 13px system-ui;
    }
    button {
      background: #333; color: #fff; border: 0;
      padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-right: 8px;
    }
    button:hover { background: #555 }
  </style>
</head>
<body>
  <div id="controls">
    <button id="reset">Reset</button>
    <button id="randomize">Randomize</button>
    <span id="fps"></span>
  </div>
  <canvas id="canvas"></canvas>
<script>
const NUM_PARTICLES = 8000;
const NUM_COLORS = 6;

const computeShader = `
struct Particle { pos: vec2f, vel: vec2f }
struct Params { n: u32, colors: u32, dt: f32, friction: f32, maxDist: f32, minDist: f32, force: f32, aspect: f32 }

@group(0) @binding(0) var<storage, read_write> particles: array<Particle>;
@group(0) @binding(1) var<storage, read> colorIdx: array<u32>;
@group(0) @binding(2) var<storage, read> attraction: array<f32>;
@group(0) @binding(3) var<uniform> p: Params;

@compute @workgroup_size(256)
fn main(@builtin(global_invocation_id) id: vec3u) {
  let i = id.x;
  if (i >= p.n) { return; }

  var me = particles[i];
  let myColor = colorIdx[i];
  var force = vec2f(0);

  for (var j = 0u; j < p.n; j++) {
    if (i == j) { continue; }
    var d = particles[j].pos - me.pos;

    // Wrap around (toroidal)
    if (d.x > 0.5) { d.x -= 1.0; }
    if (d.x < -0.5) { d.x += 1.0; }
    if (d.y > 0.5) { d.y -= 1.0; }
    if (d.y < -0.5) { d.y += 1.0; }

    // Aspect ratio correction
    var ds = d;
    if (p.aspect > 1) { ds.x *= p.aspect; } else { ds.y /= p.aspect; }

    let dist = length(ds);
    if (dist > 0 && dist < p.maxDist) {
      let attr = attraction[myColor * p.colors + colorIdx[j]];
      let dir = ds / dist;
      var f = 0.0;
      if (dist < p.minDist) {
        f = (dist / p.minDist - 1) * p.force;
      } else {
        let nd = (dist - p.minDist) / (p.maxDist - p.minDist);
        f = attr * (1 - abs(nd * 2 - 1)) * p.force;
      }
      force += dir * f;
    }
  }

  me.vel = (me.vel + force * p.dt) * p.friction;
  me.pos = fract(me.pos + me.vel * p.dt);
  particles[i] = me;
}`;

const renderShader = `
struct Particle { pos: vec2f, vel: vec2f }
struct Params { aspect: f32 }
struct Out { @builtin(position) pos: vec4f, @location(0) color: vec4f, @location(1) uv: vec2f }

@group(0) @binding(0) var<storage, read> particles: array<Particle>;
@group(0) @binding(1) var<storage, read> colorIdx: array<u32>;
@group(0) @binding(2) var<storage, read> palette: array<vec4f>;
@group(0) @binding(3) var<uniform> p: Params;

const quad = array<vec2f, 6>(vec2f(-1,-1), vec2f(1,-1), vec2f(-1,1), vec2f(-1,1), vec2f(1,-1), vec2f(1,1));

@vertex
fn vs(@builtin(vertex_index) vi: u32, @builtin(instance_index) ii: u32) -> Out {
  let pos = particles[ii].pos * 2 - 1;
  var offset = quad[vi] * 0.004;
  if (p.aspect > 1) { offset.x /= p.aspect; } else { offset.y *= p.aspect; }
  var o: Out;
  o.pos = vec4f(pos + offset, 0, 1);
  o.color = palette[colorIdx[ii]];
  o.uv = quad[vi];
  return o;
}

@fragment
fn fs(i: Out) -> @location(0) vec4f {
  if (length(i.uv) > 1) { discard; }
  return i.color;
}`;

(async () => {
  const canvas = document.getElementById('canvas');
  if (!navigator.gpu) return;

  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) return;

  const device = await adapter.requestDevice();
  const ctx = canvas.getContext('webgpu');
  const format = navigator.gpu.getPreferredCanvasFormat();

  const resize = () => {
    const dpr = devicePixelRatio || 1;
    canvas.width = innerWidth * dpr;
    canvas.height = innerHeight * dpr;
    ctx.configure({ device, format, alphaMode: 'premultiplied' });
  };
  resize();
  onresize = resize;

  // Data generators
  const genMatrix = () => Float32Array.from({ length: NUM_COLORS ** 2 }, () => Math.random() * 2 - 1);
  const genParticles = () => Float32Array.from({ length: NUM_PARTICLES * 4 }, (_, i) => i % 4 < 2 ? Math.random() : 0);
  const genColors = () => Uint32Array.from({ length: NUM_PARTICLES }, () => Math.random() * NUM_COLORS | 0);

  const palette = new Float32Array([
    1, .2, .2, 1,  .2, 1, .2, 1,  .3, .5, 1, 1,
    1, 1, .2, 1,   1, .2, 1, 1,   .2, 1, 1, 1,
  ]);

  let matrix = genMatrix(), particles = genParticles(), colors = genColors();

  // Buffers
  const STORAGE = GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST;
  const UNIFORM = GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST;

  const particleBuf = device.createBuffer({ size: particles.byteLength, usage: STORAGE });
  const colorBuf = device.createBuffer({ size: colors.byteLength, usage: STORAGE });
  const matrixBuf = device.createBuffer({ size: matrix.byteLength, usage: STORAGE });
  const paletteBuf = device.createBuffer({ size: palette.byteLength, usage: STORAGE });
  const paramsBuf = device.createBuffer({ size: 32, usage: UNIFORM });
  const renderParamsBuf = device.createBuffer({ size: 4, usage: UNIFORM });

  device.queue.writeBuffer(particleBuf, 0, particles);
  device.queue.writeBuffer(colorBuf, 0, colors);
  device.queue.writeBuffer(matrixBuf, 0, matrix);
  device.queue.writeBuffer(paletteBuf, 0, palette);

  // Pipelines
  const computePipeline = device.createComputePipeline({
    layout: 'auto',
    compute: { module: device.createShaderModule({ code: computeShader }), entryPoint: 'main' },
  });

  const renderPipeline = device.createRenderPipeline({
    layout: 'auto',
    vertex: { module: device.createShaderModule({ code: renderShader }), entryPoint: 'vs' },
    fragment: {
      module: device.createShaderModule({ code: renderShader }), entryPoint: 'fs',
      targets: [{
        format,
        blend: {
          color: { srcFactor: 'src-alpha', dstFactor: 'one-minus-src-alpha' },
          alpha: { srcFactor: 'one', dstFactor: 'one-minus-src-alpha' },
        },
      }],
    },
    primitive: { topology: 'triangle-list' },
  });

  // Bind groups
  const computeBindGroup = device.createBindGroup({
    layout: computePipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: { buffer: particleBuf } },
      { binding: 1, resource: { buffer: colorBuf } },
      { binding: 2, resource: { buffer: matrixBuf } },
      { binding: 3, resource: { buffer: paramsBuf } },
    ],
  });

  const renderBindGroup = device.createBindGroup({
    layout: renderPipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: { buffer: particleBuf } },
      { binding: 1, resource: { buffer: colorBuf } },
      { binding: 2, resource: { buffer: paletteBuf } },
      { binding: 3, resource: { buffer: renderParamsBuf } },
    ],
  });

  // Params buffer view
  const params = new ArrayBuffer(32);
  const pv = new DataView(params);
  pv.setUint32(0, NUM_PARTICLES, true);
  pv.setUint32(4, NUM_COLORS, true);
  pv.setFloat32(8, 0.005, true);  // dt
  pv.setFloat32(12, 0.8, true);   // friction
  pv.setFloat32(16, 0.15, true);  // maxDist
  pv.setFloat32(20, 0.02, true);  // minDist
  pv.setFloat32(24, 1.0, true);   // force

  // Controls
  document.getElementById('reset').onclick = () => {
    particles = genParticles();
    colors = genColors();
    device.queue.writeBuffer(particleBuf, 0, particles);
    device.queue.writeBuffer(colorBuf, 0, colors);
  };

  document.getElementById('randomize').onclick = () => {
    matrix = genMatrix();
    device.queue.writeBuffer(matrixBuf, 0, matrix);
  };

  // FPS counter
  let lastTime = performance.now(), frameCount = 0;
  const fpsEl = document.getElementById('fps');

  // Render loop
  const frame = () => {
    frameCount++;
    const now = performance.now();
    if (now - lastTime >= 1000) {
      fpsEl.textContent = `${frameCount} FPS`;
      frameCount = 0;
      lastTime = now;
    }

    const aspect = canvas.width / canvas.height;
    pv.setFloat32(28, aspect, true);
    device.queue.writeBuffer(paramsBuf, 0, params);
    device.queue.writeBuffer(renderParamsBuf, 0, new Float32Array([aspect]));

    const encoder = device.createCommandEncoder();

    const compute = encoder.beginComputePass();
    compute.setPipeline(computePipeline);
    compute.setBindGroup(0, computeBindGroup);
    compute.dispatchWorkgroups(Math.ceil(NUM_PARTICLES / 256));
    compute.end();

    const render = encoder.beginRenderPass({
      colorAttachments: [{
        view: ctx.getCurrentTexture().createView(),
        clearValue: { r: 0.02, g: 0.02, b: 0.05, a: 1 },
        loadOp: 'clear',
        storeOp: 'store',
      }],
    });
    render.setPipeline(renderPipeline);
    render.setBindGroup(0, renderBindGroup);
    render.draw(6, NUM_PARTICLES);
    render.end();

    device.queue.submit([encoder.finish()]);
    requestAnimationFrame(frame);
  };

  frame();
})();
</script>
</body>
</html>
